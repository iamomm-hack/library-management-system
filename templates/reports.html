{% extends "base.html" %}

{% block content %}
<div class="container page-shell">
    <div class="card">
        <div class="page-head">
            <h2>Reports</h2>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
        </div>
        <div class="dash-stats-grid reports-grid">
            <div class="mini-stat"><div><p>Total Students</p><h3>{{ students }}</h3></div><span>👤</span></div>
            <div class="mini-stat"><div><p>Total Books</p><h3>{{ books }}</h3></div><span>📚</span></div>
            <div class="mini-stat"><div><p>Active Issues</p><h3>{{ active_issues }}</h3></div><span>🕘</span></div>
            <div class="mini-stat"><div><p>Returned</p><h3>{{ returned }}</h3></div><span>✅</span></div>
        </div>
        <div class="report-note">
            <h3>Total Fine Collected/Pending</h3>
            <p>₹ {{ '%.2f'|format(total_fine or 0) }}</p>
        </div>
    </div>
</div>
{% endblock %}
