{% extends "base.html" %}

{% block content %}
<div class="container page-shell">
    <div class="card">
        <div class="page-head">
            <h2>Reports</h2>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
        </div>
        <div class="dash-stats-grid reports-grid">
            <div class="mini-stat">
                <div>
                    <p>Total Students</p>
                    <h3>{{ students }}</h3>
                </div>
                <span>
                    <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.8"/>
                        <circle cx="16" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M3.5 19a4.5 4.5 0 0 1 9 0M12 19a4 4 0 0 1 8 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </span>
            </div>
            <div class="mini-stat">
                <div>
                    <p>Total Books</p>
                    <h3>{{ books }}</h3>
                </div>
                <span>
                    <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H6.5A2.5 2.5 0 0 0 4 21V5.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4 5.5V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M9 7.5h7M9 11h7M9 14.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </span>
            </div>
            <div class="mini-stat">
                <div>
                    <p>Active Issues</p>
                    <h3>{{ active_issues }}</h3>
                </div>
                <span>
                    <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M12 8v4l2.5 2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
            </div>
            <div class="mini-stat">
                <div>
                    <p>Returned</p>
                    <h3>{{ returned }}</h3>
                </div>
                <span>
                    <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 12.5 9.2 17 19 7.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                </span>
            </div>
        </div>
        <div class="report-note">
            <h3>Total Fine Collected/Pending</h3>
            <p>₹ {{ '%.2f'|format(total_fine or 0) }}</p>
        </div>
    </div>
</div>
{% endblock %}
