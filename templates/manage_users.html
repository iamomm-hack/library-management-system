{% extends "base.html" %}

{% block content %}
<div class="container page-shell">
    <div class="card">
        <div class="page-head">
            <h2>Manage Users</h2>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
        </div>
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr>
                        <td>{{ u.user_id }}</td>
                        <td>{{ u.full_name }}</td>
                        <td>{{ u.username }}</td>
                        <td>{{ u.email or '-' }}</td>
                        <td>{{ u.phone or '-' }}</td>
                        <td>{{ u.role }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="6">No users found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
