{% extends "base.html" %}

{% block content %}
<div class="container login-container">
    <div class="card">
        <h1 class="login-title">📚 Library Management</h1>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" title="Username" aria-label="Username" autocomplete="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" title="Password" aria-label="Password" autocomplete="current-password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>
        </form>
        
        <hr class="hr-spaced">
        
        <p class="center-text muted-text">
            <strong>Demo Credentials:</strong>
        </p>
        <p class="center-text small-text">
            Admin: admin / admin123<br>
            Librarian: librarian / lib123
        </p>
    </div>
</div>
{% endblock %}
