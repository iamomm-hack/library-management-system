{% extends "base.html" %}

{% block content %}
<div class="container login-container">
    <div class="card">
        <h1 class="login-title">
            <span class="title-with-icon">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H6.5A2.5 2.5 0 0 0 4 21V5.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 5.5V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M9 7.5h7M9 11h7M9 14.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span>Library Management</span>
            </span>
        </h1>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" title="Username" aria-label="Username" autocomplete="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" title="Password" aria-label="Password" autocomplete="current-password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
