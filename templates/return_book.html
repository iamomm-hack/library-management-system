{% extends "base.html" %}

{% block content %}
<div class="container narrow-form-container">
    <div class="card">
        <h2 class="form-page-title">Return Book</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Issue Record ID</label>
                <input type="text" name="issue_id" placeholder="Enter issue ID" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success btn-block">Return Book</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-block">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
