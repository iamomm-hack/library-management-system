{% extends "base.html" %}

{% block content %}
<div class="container narrow-form-container">
    <div class="card">
        <h2 class="form-page-title">Issue Book to Student</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Student ID / Enrollment Number</label>
                <input type="text" name="user_id" placeholder="Enter student ID" required>
            </div>
            
            <div class="form-group">
                <label>Book ID / Title</label>
                <input type="text" name="book_id" placeholder="Enter book ID" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success btn-block">Issue Book</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-block">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
