{% extends "base.html" %}

{% block content %}
<div class="container page-shell">
    <div class="card">
        <div class="page-head">
            <h2>Activity Log</h2>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
        </div>
        <div class="table-wrap">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Log ID</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Details</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in records %}
                    <tr>
                        <td>{{ r.log_id }}</td>
                        <td>{{ r.full_name or '-' }}</td>
                        <td>{{ r.action }}</td>
                        <td>{{ r.details }}</td>
                        <td>{{ r.timestamp }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="5">No activity records found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
