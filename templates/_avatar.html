{% macro avatar_label(name, gender='male') -%}
<span class="avatar-inline">
    <span class="avatar-badge {{ 'avatar-female' if gender == 'female' else 'avatar-male' }}" aria-hidden="true">
        <svg class="icon avatar-pfp-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="11" class="avatar-pfp-bg"/>
            <circle cx="12" cy="9.2" r="3.5" class="avatar-pfp-shape"/>
            <path d="M4.3 20a7.7 7.7 0 0 1 15.4 0" class="avatar-pfp-shape"/>
        </svg>
    </span>
    <span class="avatar-text">{{ name }}</span>
</span>
{%- endmacro %}
