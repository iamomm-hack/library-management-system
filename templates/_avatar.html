{% macro avatar_label(name, gender='male') -%}
<span class="avatar-inline">
    <span class="avatar-badge {{ 'avatar-female' if gender == 'female' else 'avatar-male' }}" aria-hidden="true">
        {% if gender == 'female' %}
        <svg class="icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 11.8v7.2M8.8 15h6.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M6.5 20h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        {% else %}
        <svg class="icon" viewBox="0 0 24 24" fill="none">
            <circle cx="9.2" cy="14.8" r="4.2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13 11 18.5 5.5M15 5.5h3.5V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        {% endif %}
    </span>
    <span class="avatar-text">{{ name }}</span>
</span>
{%- endmacro %}
